version: "2"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - revive
    - godot
    - noctx
    - bodyclose

linters-settings:
  goimports:
    local-prefixes: github.com/alannguyen/manifestor
  revive:
    rules:
      - name: exported
        severity: warning
  godot:
    scope: declarations

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - godot
